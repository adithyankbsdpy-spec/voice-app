<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: lightblue;
        }

        input, select {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            margin: 10px;
            background: #ff4b2b;
            color: white;
            border-radius: 10px;
            border: none;
        }

        .mic-on {
            background: green !important;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 5px auto;
            padding: 8px;
            width: 220px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>🎮 Voice Chat</h1>

<input id="name" placeholder="Enter name"><br>

<select id="team">
    <option value="A">Team A</option>
    <option value="B">Team B</option>
</select><br>

<button id="micBtn" onclick="enableMic()">🎤 Enable Mic</button><br>
<button onclick="join()">Join</button>

<p id="status"></p>

<h3>👥 Players</h3>
<ul id="playerList"></ul>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCl0Xr_85Gjf3Lfzbs1uvx8eIPiFLTWT3c",
  authDomain: "voice-app-65f97.firebaseapp.com",
  databaseURL: "https://voice-app-65f97-default-rtdb.firebaseio.com",
  projectId: "voice-app-65f97"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 WebRTC config
const servers = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

let localStream;
let myName;
let peerConnections = {};

// 🎤 ENABLE MIC
function enableMic() {
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        localStream = stream;
        document.getElementById("micBtn").innerText = "✅ Mic ON";
        document.getElementById("micBtn").classList.add("mic-on");
        console.log("Mic ready 🎤");
    })
    .catch(() => {
        alert("Allow microphone!");
    });
}

// 🎮 JOIN
function join() {
    myName = document.getElementById("name").value;
    let team = document.getElementById("team").value;

    if (!localStream) {
        alert("Enable mic first");
        return;
    }

    document.getElementById("status").innerText = "Joined";

    db.ref("players/" + myName).set({
        name: myName,
        team: team
    });

    listenPlayers();
}

// 👥 LISTEN PLAYERS
function listenPlayers() {
    db.ref("players").on("value", snap => {
        let list = document.getElementById("playerList");
        list.innerHTML = "";

        snap.forEach(child => {
            let player = child.val();

            let li = document.createElement("li");
            li.innerText = player.name + " (Team " + player.team + ")";
            list.appendChild(li);

            if (player.name !== myName && !peerConnections[player.name]) {
                createConnection(player.name);
            }
        });
    });
}

// 🔗 CREATE CONNECTION
function createConnection(otherUser) {

    let pc = new RTCPeerConnection(servers);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = e => {
        console.log("Audio received 🔊");

        let audio = document.createElement("audio");
        audio.srcObject = e.streams[0];

        audio.autoplay = true;
        audio.muted = false;
        audio.volume = 1.0;

        audio.play().then(() => {
            console.log("Playing sound ✅");
        }).catch(err => {
            console.log("Autoplay blocked ❌", err);
        });

        document.body.appendChild(audio);
    };

    pc.onicecandidate = event => {
        if (event.candidate) {
            db.ref("calls/" + myName + "_" + otherUser + "/candidates")
            .push(event.candidate);
        }
    };

    peerConnections[otherUser] = pc;

    pc.createOffer().then(offer => {
        pc.setLocalDescription(offer);

        db.ref("calls/" + myName + "_" + otherUser).set({
            offer: offer
        });
    });

    db.ref("calls/" + otherUser + "_" + myName).on("value", snap => {
        let data = snap.val();
        if (data && data.answer) {
            pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    });

    db.ref("calls/" + otherUser + "_" + myName + "/candidates")
    .on("child_added", snap => {
        pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

// 📡 ANSWER SIDE
db.ref("calls").on("child_added", snap => {

    let key = snap.key;
    let data = snap.val();

    if (!myName) return;

    if (key.includes("_" + myName) && data.offer) {

        let caller = key.split("_")[0];

        let pc = new RTCPeerConnection(servers);

        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

        pc.ontrack = e => {
            console.log("Audio received 🔊");

            let audio = document.createElement("audio");
            audio.srcObject = e.streams[0];

            audio.autoplay = true;
            audio.muted = false;
            audio.volume = 1.0;

            audio.play().then(() => {
                console.log("Playing sound ✅");
            }).catch(err => {
                console.log("Autoplay blocked ❌", err);
            });

            document.body.appendChild(audio);
        };

        pc.onicecandidate = event => {
            if (event.candidate) {
                db.ref("calls/" + key + "/candidates")
                .push(event.candidate);
            }
        };

        pc.setRemoteDescription(new RTCSessionDescription(data.offer));

        pc.createAnswer().then(answer => {
            pc.setLocalDescription(answer);

            db.ref("calls/" + key).update({
                answer: answer
            });
        });

        db.ref("calls/" + key + "/candidates")
        .on("child_added", snap => {
            pc.addIceCandidate(new RTCIceCandidate(snap.val()));
        });
    }
});

</script>

</body>
</html>
