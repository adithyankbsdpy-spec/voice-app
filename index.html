<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: lightblue;
        }

        button {
            padding: 10px;
            margin: 10px;
            background: #ff4b2b;
            color: white;
            border-radius: 10px;
            border: none;
        }

        .mic-on {
            background: green !important;
        }
    </style>
</head>

<body>

<h1>🎮 Voice Chat</h1>

<input id="name" placeholder="Enter name"><br>

<button id="micBtn" onclick="enableMic()">🎤 Enable Mic</button><br>
<button onclick="join()">Join</button>

<p id="status"></p>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCl0Xr_85Gjf3Lfzbs1uvx8eIPiFLTWT3c",
  authDomain: "voice-app-65f97.firebaseapp.com",
  databaseURL: "https://voice-app-65f97-default-rtdb.firebaseio.com",
  projectId: "voice-app-65f97"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const servers = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

let localStream;
let myName;
let pc;

// 🎤 MIC
function enableMic() {
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        localStream = stream;
        document.getElementById("micBtn").innerText = "✅ Mic ON";
        document.getElementById("micBtn").classList.add("mic-on");
    });
}

// 🎮 JOIN
function join() {
    myName = document.getElementById("name").value;

    if (!localStream) {
        alert("Enable mic first");
        return;
    }

    document.getElementById("status").innerText = "Joined";

    db.ref("users/" + myName).set(true);

    db.ref("users").once("value", snap => {
        if (snap.numChildren() === 1) {
            waitForCall(); // first user waits
        } else {
            startCall(); // second user starts call
        }
    });
}

// 🔗 START CALL (only second user)
function startCall() {

    pc = new RTCPeerConnection(servers);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = e => {
        let audio = document.createElement("audio");
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        audio.controls = true;
        document.body.appendChild(audio);
    };

    pc.onicecandidate = e => {
        if (e.candidate) {
            db.ref("signal/candidate").push(e.candidate);
        }
    };

    pc.createOffer().then(o => {
        pc.setLocalDescription(o);
        db.ref("signal/offer").set(o);
    });

    db.ref("signal/answer").on("value", snap => {
        let ans = snap.val();
        if (ans && pc.signalingState !== "stable") {
            pc.setRemoteDescription(new RTCSessionDescription(ans));
        }
    });

    db.ref("signal/candidate").on("child_added", snap => {
        pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

// 📡 WAIT + ANSWER (first user)
function waitForCall() {

    pc = new RTCPeerConnection(servers);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = e => {
        let audio = document.createElement("audio");
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        audio.controls = true;
        document.body.appendChild(audio);
    };

    pc.onicecandidate = e => {
        if (e.candidate) {
            db.ref("signal/candidate").push(e.candidate);
        }
    };

    db.ref("signal/offer").on("value", snap => {
        let offer = snap.val();

        if (offer && pc.signalingState === "stable") {
            pc.setRemoteDescription(new RTCSessionDescription(offer));

            pc.createAnswer().then(ans => {
                pc.setLocalDescription(ans);
                db.ref("signal/answer").set(ans);
            });
        }
    });

    db.ref("signal/candidate").on("child_added", snap => {
        pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

</script>

</body>
</html>
